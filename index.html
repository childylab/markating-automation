<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마케팅 퍼포먼스 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">마케팅 퍼포먼스</h1>
    </div>
    <div class="header-right">
      <div class="period-control">
        <select id="periodSelect" class="select-input">
          <option value="7">최근 7일</option>
          <option value="7ex">최근 7일 (오늘제외)</option>
          <option value="30" selected>최근 30일</option>
          <option value="30ex">최근 30일 (오늘제외)</option>
          <option value="custom">직접선택</option>
        </select>
        <div class="custom-dates hidden" id="customDates">
          <input type="date" id="startDate" class="date-input">
          <span class="date-sep">~</span>
          <input type="date" id="endDate" class="date-input">
          <button class="btn-sm" id="applyDate">적용</button>
        </div>
      </div>
    </div>
  </header>

  <!-- Channel Tabs -->
  <section class="channel-tabs">
    <button class="channel-tab active" data-channel="SA">
      <span class="channel-tab-label">SA 검색광고</span>
      <span class="channel-tab-sub">1667291 · 남도마켓 대행</span>
    </button>
    <button class="channel-tab" data-channel="DA">
      <span class="channel-tab-label">DA 디스플레이</span>
      <span class="channel-tab-sub">1667290 · 자체운영 · AdVoost</span>
    </button>
  </section>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar"></div>

  <!-- KPI Cards -->
  <section class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">광고비</span>
        <span class="kpi-value" id="kpiCost">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">노출</span>
        <span class="kpi-value" id="kpiImpressions">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">클릭</span>
        <span class="kpi-value" id="kpiClicks">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">CTR</span>
        <span class="kpi-value" id="kpiCtr">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">구매전환</span>
        <span class="kpi-value" id="kpiPurchase">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">구매매출</span>
        <span class="kpi-value" id="kpiRevenue">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">구매 ROAS</span>
        <span class="kpi-value" id="kpiRoas">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">CPC</span>
        <span class="kpi-value" id="kpiCpc">-</span>
      </div>
    </div>
  </section>

  <!-- Actions -->
  <section class="actions-section">
    <button class="btn-action" id="btnRefresh">↻ 데이터 새로고침</button>
    <label class="btn-action da-upload hidden" id="btnUploadWrap">
      📂 CSV 업로드
      <input type="file" id="daFileInput" accept=".csv" style="display:none">
    </label>
  </section>

  <!-- Campaign Table -->
  <section class="table-section">
    <div class="table-wrap">
      <table class="data-table" id="mainTable">
        <thead>
          <tr>
            <th>캠페인</th>
            <th class="num">광고비</th>
            <th class="num">노출</th>
            <th class="num">클릭</th>
            <th class="num">CTR</th>
            <th class="num">장바구니</th>
            <th class="num">구매</th>
            <th class="num">구매액</th>
            <th class="num">구매ROAS</th>
            <th class="num">노출→구매</th>
            <th class="num">클릭→구매</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
