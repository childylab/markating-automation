<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마케팅 퍼포먼스 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-left">
      <h1 class="header-title">마케팅 퍼포먼스 대시보드</h1>
      <span class="header-sub">차일디 · 네이버 광고</span>
    </div>
    <div class="header-right">
      <div class="period-control">
        <select id="periodSelect" class="select-input">
          <option value="7">최근 7일</option>
          <option value="7ex">최근 7일 (오늘제외)</option>
          <option value="30" selected>최근 30일</option>
          <option value="30ex">최근 30일 (오늘제외)</option>
          <option value="custom">직접선택</option>
        </select>
        <div class="custom-dates hidden" id="customDates">
          <input type="date" id="startDate" class="date-input">
          <span class="date-sep">~</span>
          <input type="date" id="endDate" class="date-input">
          <button class="btn-sm" id="applyDate">적용</button>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn-action" id="btnRefreshSA" title="SA 데이터 새로고침">↻ SA</button>
        <label class="btn-action da" title="DA CSV 업로드">
          📂 DA 업로드
          <input type="file" id="daFileInput" accept=".csv" style="display:none">
        </label>
      </div>
    </div>
  </header>

  <!-- Status Bar -->
  <div class="status-bar" id="statusBar"></div>

  <!-- KPI Row -->
  <section class="kpi-row">
    <div class="kpi-card sa">
      <div class="kpi-header"><span class="kpi-badge">SA</span> CPC</div>
      <div class="kpi-value" id="saCpc">-</div>
    </div>
    <div class="kpi-card sa">
      <div class="kpi-header"><span class="kpi-badge">SA</span> 구매ROAS</div>
      <div class="kpi-value" id="saRoas">-</div>
    </div>
    <div class="kpi-card da">
      <div class="kpi-header"><span class="kpi-badge da-badge">DA</span> CPC</div>
      <div class="kpi-value" id="daCpc">-</div>
    </div>
    <div class="kpi-card da">
      <div class="kpi-header"><span class="kpi-badge da-badge">DA</span> 구매ROAS</div>
      <div class="kpi-value" id="daRoas">-</div>
    </div>
    <div class="kpi-card total">
      <div class="kpi-header"><span class="kpi-badge total-badge">전체</span> 광고비</div>
      <div class="kpi-value" id="totalCost">-</div>
    </div>
    <div class="kpi-card total">
      <div class="kpi-header"><span class="kpi-badge total-badge">전체</span> 구매전환</div>
      <div class="kpi-value" id="totalConv">-</div>
    </div>
  </section>

  <!-- Main Content: Columns by Account -->
  <section class="columns">
    <!-- SA Column -->
    <div class="column">
      <div class="column-header">
        <span class="column-title">SA 검색광고</span>
        <span class="column-sub">계정 1667291 · 남도마켓 대행</span>
      </div>
      <div class="summary-row" id="saSummary"></div>
      <div class="table-wrap">
        <table class="data-table" id="saTable">
          <thead>
            <tr>
              <th>캠페인</th>
              <th class="num">광고비</th>
              <th class="num">노출</th>
              <th class="num">클릭</th>
              <th class="num">CTR</th>
              <th class="num">장바구니</th>
              <th class="num">구매</th>
              <th class="num">구매액</th>
              <th class="num">구매ROAS</th>
              <th class="num">노출→구매</th>
              <th class="num">클릭→구매</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>

    <!-- DA Column -->
    <div class="column">
      <div class="column-header">
        <span class="column-title">DA 성과형 디스플레이</span>
        <span class="column-sub">계정 1667290 · 자체운영 · AdVoost</span>
      </div>
      <div class="summary-row" id="daSummary"></div>
      <div class="table-wrap">
        <table class="data-table" id="daTable">
          <thead>
            <tr>
              <th>캠페인</th>
              <th class="num">광고비</th>
              <th class="num">노출</th>
              <th class="num">클릭</th>
              <th class="num">CTR</th>
              <th class="num">장바구니</th>
              <th class="num">구매</th>
              <th class="num">구매액</th>
              <th class="num">구매ROAS</th>
              <th class="num">노출→구매</th>
              <th class="num">클릭→구매</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
