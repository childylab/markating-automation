<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>퍼포먼스 대시보드</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500,600,700&display=swap" rel="stylesheet">

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════
       TOP NAV (sticky)
  ═══════════════════════════════════════════ -->
  <header class="top-nav">
    <div class="top-nav-inner">
      <div class="top-nav-brand">
        <span class="brand-icon">📊</span>
        <strong class="brand-name">퍼포먼스 대시보드</strong>
      </div>
      <nav class="top-nav-tabs" id="mainNav">
        <a href="#dashboard" class="nav-tab active" data-page="dashboard">통합 대시보드</a>
        <a href="#brand-analysis" class="nav-tab" data-page="brand-analysis">브랜드/매체 분석</a>
        <a href="#roi-analysis" class="nav-tab" data-page="roi-analysis">ROI 분석</a>
        <span class="nav-divider"></span>
        <a href="#sns" class="nav-tab" data-page="sns">SNS 성과</a>
        <a href="#data-management" class="nav-tab" data-page="data-management">데이터 관리</a>
        <a href="#settings" class="nav-tab" data-page="settings">설정</a>
      </nav>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ═══════════════════════════════════════════ -->
  <main class="main-content">

    <!-- ═══ PAGE: DASHBOARD ═══ -->
    <div class="page-content" id="page-dashboard">

      <!-- Filter Row -->
      <section class="filter-row">
        <div class="filter-group">
          <select id="filterBrand" class="filter-select">
            <option value="all">브랜드: 전체</option>
            <option value="odp">ODP</option>
            <option value="ordinary">오디너리홀리데이</option>
            <option value="childy">차일디</option>
          </select>
          <select id="filterMedia" class="filter-select">
            <option value="all">매체: 전체</option>
            <option value="naver_sa">네이버SA</option>
            <option value="naver_da">네이버DA</option>
            <option value="meta">메타</option>
            <option value="criteo">크리테오</option>
            <option value="kakao_friendtalk">카카오 친구톡</option>
          </select>
          <select id="filterAdType" class="filter-select">
            <option value="all">광고유형: 전체</option>
          </select>
          <select id="periodSelect" class="filter-select">
            <option value="7d">기간: 최근 7일 (오늘 제외)</option>
            <option value="30d">최근 30일</option>
            <option value="thisMonth">이번 달</option>
            <option value="custom">직접 선택</option>
          </select>
          <div class="filter-dates" id="customDates" style="display:none;">
            <input type="date" id="startDate" class="filter-input">
            <span class="filter-date-sep">~</span>
            <input type="date" id="endDate" class="filter-input">
          </div>
          <button class="btn btn-primary" id="btnQuery" style="margin-left:auto;">데이터 로드</button>
        </div>
      </section>

      <!-- KPI Cards - 3줄 구성 -->
      <section class="kpi-grid kpi-grid-7">
        <div class="kpi-card" id="kpiImpressions"><span class="kpi-label">노출 수</span><span class="kpi-value">—</span></div>
        <div class="kpi-card" id="kpiClicks"><span class="kpi-label">클릭 수</span><span class="kpi-value">—</span></div>
        <div class="kpi-card" id="kpiCtr"><span class="kpi-label">CTR</span><span class="kpi-value">—</span></div>
        <div class="kpi-card" id="kpiCart"><span class="kpi-label">장바구니</span><span class="kpi-value">—</span></div>
        <div class="kpi-card" id="kpiPurchase"><span class="kpi-label">구매 수</span><span class="kpi-value">—</span></div>
        <div class="kpi-card" id="kpiConvRate"><span class="kpi-label">구매전환율</span><span class="kpi-value">—</span></div>
      </section>
      <section class="kpi-grid kpi-grid-6">
        <div class="kpi-card kpi-blue" id="kpiCost"><span class="kpi-label">총 광고집행액</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-blue" id="kpiRevenue"><span class="kpi-label">구매전환액(광고매출)</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-blue" id="kpiRoas"><span class="kpi-label">ROAS</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-green" id="kpiTotalRevenue"><span class="kpi-label">전체 매출</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-green" id="kpiAdRevenueRatio"><span class="kpi-label">광고 매출 비중</span><span class="kpi-value">—</span></div>
      </section>
      <section class="kpi-grid kpi-grid-4">
        <div class="kpi-card kpi-red" id="kpiCogs"><span class="kpi-label">상품원가</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-red" id="kpiLogistics"><span class="kpi-label">고정비(물류)</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-red" id="kpiMallFee"><span class="kpi-label">몰수수료(합산)</span><span class="kpi-value">—</span></div>
        <div class="kpi-card kpi-red" id="kpiRoi"><span class="kpi-label">ROI</span><span class="kpi-value">—</span></div>
      </section>

      <!-- Charts Section -->
      <section class="charts-grid">
        <!-- Left: ROAS/ROI Trend -->
        <div class="chart-panel">
          <div class="chart-header">
            <h3 class="chart-title">성과 추이</h3>
            <div class="chart-toggles">
              <button class="btn btn-ghost btn-xs active" id="btnChartRoas">ROAS</button>
              <button class="btn btn-ghost btn-xs" id="btnChartRoi">ROI</button>
            </div>
          </div>
          <div class="chart-body">
            <canvas id="trendChart" height="200"></canvas>
          </div>
        </div>

        <!-- Right: Media Spend Ratio -->
        <div class="chart-panel">
          <div class="chart-header">
            <h3 class="chart-title">매체별 광고비 비중</h3>
          </div>
          <div class="chart-body chart-body-donut">
            <canvas id="mediaChart" height="160"></canvas>
          </div>
        </div>
      </section>

      <!-- Table Title -->
      <div class="section-heading">
        <h2 class="section-title">캠페인별 상세 데이터</h2>
      </div>

      <!-- Data Table -->
      <section class="table-wrap">
        <table class="data-table" id="mainTable">
          <thead>
            <tr>
              <th style="width:28px;"></th>
              <th class="sortable" data-col="brand" data-type="str">브랜드 <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="media" data-type="str">매체 <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="adType" data-type="str">광고유형 <span class="sort-arrow"></span></th>
              <th class="sortable" data-col="name" data-type="str">캠페인 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="impressions" data-type="num">노출 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="clicks" data-type="num">클릭 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="ctr" data-type="num">CTR <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="cartCount" data-type="num">장바구니 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="purchaseCount" data-type="num">구매 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="cost" data-type="num">광고비 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="purchaseAmount" data-type="num">구매액(광고매출) <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="roas" data-type="num">ROAS <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="totalRevenue" data-type="num">전체매출 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="adRevenueRatio" data-type="num">광고매출비중 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="platformFeeCost" data-type="num">몰수수료 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="logisticsCost" data-type="num">고정비 <span class="sort-arrow"></span></th>
              <th class="num sortable" data-col="roi" data-type="num">ROI <span class="sort-arrow"></span></th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </section>

    </div>

    <!-- ═══ PAGE: SNS ═══ -->
    <div class="page-content hidden" id="page-sns">
      <section class="page-inner">
        <div class="sub-nav" id="snsSubNav">
          <button class="sub-nav-btn active" data-subpage="instagram">인스타그램</button>
          <button class="sub-nav-btn" data-subpage="threads">쓰레드</button>
        </div>
        <div class="page-body" id="snsBody"></div>
      </section>
    </div>

    <!-- ═══ PAGE: BRAND ANALYSIS ═══ -->
    <div class="page-content hidden" id="page-brand-analysis">
      <section class="page-inner">
        <div class="sub-nav" id="brandSubNav">
          <button class="sub-nav-btn active" data-subpage="brand">브랜드별 성과</button>
          <button class="sub-nav-btn" data-subpage="media">매체별 성과</button>
        </div>
        <div class="page-body" id="brandAnalysisBody"></div>
      </section>
    </div>

    <!-- ═══ PAGE: ROI ANALYSIS ═══ -->
    <div class="page-content hidden" id="page-roi-analysis">
      <section class="page-inner">
        <div class="sub-nav" id="roiSubNav">
          <button class="sub-nav-btn active" data-subpage="period">기간별 ROI</button>
          <button class="sub-nav-btn" data-subpage="media">매체별 ROI</button>
          <button class="sub-nav-btn" data-subpage="brand">브랜드별 ROI</button>
        </div>
        <div class="page-body" id="roiAnalysisBody"></div>
      </section>
    </div>

    <!-- ═══ PAGE: DATA MANAGEMENT ═══ -->
    <div class="page-content hidden" id="page-data-management">
      <section class="page-inner">
        <div class="sub-nav" id="dataSubNav">
          <button class="sub-nav-btn active" data-subpage="status">수집 현황</button>
          <button class="sub-nav-btn" data-subpage="upload">CSV 업로드</button>
          <button class="sub-nav-btn" data-subpage="correction">데이터 보정</button>
        </div>
        <div class="page-body" id="dataManagementBody"></div>
      </section>
    </div>

    <!-- ═══ PAGE: SETTINGS ═══ -->
    <div class="page-content hidden" id="page-settings">
      <section class="page-inner">
        <div class="sub-nav" id="settingsSubNav">
          <button class="sub-nav-btn active" data-subpage="api">API 연동</button>
          <button class="sub-nav-btn" data-subpage="cost">수수료/비용 설정</button>
          <button class="sub-nav-btn" data-subpage="alerts">알림 설정</button>
        </div>
        <div class="page-body" id="settingsBody"></div>
      </section>
    </div>

    <!-- Status bar -->
    <div class="status-bar" id="statusBar"></div>

    <!-- Hidden CSV input -->
    <label class="visually-hidden">
      DA 파일 업로드
      <input type="file" id="daFileInput" accept=".csv">
    </label>
  </main>

  <script src="app.js"></script>
</body>
</html>
