<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마케팅 퍼포먼스 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navigation">
    <div class="nav-inner">
      <span class="nav-title">마케팅 퍼포먼스</span>
      <span class="nav-badge">차일디</span>
    </div>
  </nav>

  <!-- Period Filter -->
  <section class="period-section">
    <div class="period-presets">
      <button class="period-btn active" data-period="7">최근 7일</button>
      <button class="period-btn" data-period="7ex">최근 7일(오늘제외)</button>
      <button class="period-btn" data-period="30">최근 30일</button>
      <button class="period-btn" data-period="30ex">최근 30일(오늘제외)</button>
      <button class="period-btn" data-period="custom">직접선택</button>
    </div>
    <div class="period-custom hidden" id="periodCustom">
      <div class="date-inputs">
        <input type="date" id="startDate" class="date-input">
        <span class="date-separator">~</span>
        <input type="date" id="endDate" class="date-input">
      </div>
      <button class="apply-btn" id="applyCustomDate">적용하기</button>
    </div>
    <div class="period-label" id="periodLabel">2026.06.30 ~ 2026.07.07</div>
  </section>

  <!-- Account Tab -->
  <section class="account-section">
    <div class="tab-group">
      <button class="tab active" data-account="all">전체</button>
      <button class="tab" data-account="SA">SA (검색광고)</button>
      <button class="tab" data-account="DA">DA (디스플레이)</button>
    </div>
  </section>

  <!-- KPI Cards -->
  <section class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">총 광고비</span>
        <span class="kpi-value" id="totalCost">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">총 클릭</span>
        <span class="kpi-value" id="totalClicks">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">총 전환</span>
        <span class="kpi-value" id="totalConversions">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">ROAS</span>
        <span class="kpi-value" id="totalRoas">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">노출수</span>
        <span class="kpi-value" id="totalImpressions">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">평균 CPC</span>
        <span class="kpi-value" id="avgCpc">-</span>
      </div>
    </div>
  </section>

  <!-- Campaign Type Filter -->
  <section class="type-section">
    <div class="tab-group">
      <button class="type-tab active" data-type="all">전체</button>
      <button class="type-tab" data-type="SHOPPING">쇼핑검색</button>
      <button class="type-tab" data-type="BRAND_SEARCH">브랜드검색</button>
      <button class="type-tab" data-type="WEB_SITE">파워링크</button>
      <button class="type-tab" data-type="DISPLAY">애드부스트</button>
    </div>
  </section>

  <!-- Campaign List -->
  <section class="list-section">
    <div class="list-header">
      <span class="list-header-title">캠페인별 성과</span>
      <span class="list-header-action" id="sortToggle">비용순 ↓</span>
    </div>
    <div class="list-body" id="campaignList">
    </div>
  </section>

  <!-- Account Info -->
  <section class="info-section">
    <div class="info-card">
      <span class="caption">SA 계정</span>
      <span class="body">차일디 (1667291) · 남도마켓 대행</span>
    </div>
    <div class="info-card">
      <span class="caption">DA 계정</span>
      <span class="body">차일디 (1667290) · 자체 운영</span>
    </div>
    <div class="info-card">
      <span class="caption">매체</span>
      <span class="body">네이버 검색광고 + 성과형 디스플레이</span>
    </div>
  </section>

  <!-- Data Actions (Bottom CTA) -->
  <section class="action-section">
    <button class="action-btn primary" id="btnRefreshSA">SA 데이터 새로고침</button>
    <button class="action-btn secondary" id="btnFetchDA">DA 데이터 불러오기</button>
    <button class="action-btn tertiary" id="btnLoginDA">네이버 로그인 (DA 최초설정)</button>
    <div class="action-status" id="actionStatus"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
