<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>마케팅 퍼포먼스 대시보드</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Navigation -->
  <nav class="navigation">
    <div class="nav-inner">
      <span class="nav-title">마케팅 퍼포먼스</span>
      <span class="nav-period" id="periodLabel">최근 1달</span>
    </div>
  </nav>

  <!-- Top Summary -->
  <section class="top-section">
    <h1 class="title-large">캠페인 성과 리포트</h1>
    <p class="body text-secondary">네이버 SA 계정 기준 최근 30일 성과예요</p>
  </section>

  <!-- KPI Cards -->
  <section class="kpi-section">
    <div class="kpi-grid">
      <div class="kpi-card">
        <span class="kpi-label">총 광고비</span>
        <span class="kpi-value" id="totalCost">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">총 클릭</span>
        <span class="kpi-value" id="totalClicks">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">총 전환</span>
        <span class="kpi-value" id="totalConversions">-</span>
      </div>
      <div class="kpi-card">
        <span class="kpi-label">ROAS</span>
        <span class="kpi-value" id="totalRoas">-</span>
      </div>
    </div>
  </section>

  <!-- Tab Filter -->
  <section class="tab-section">
    <div class="tab-group">
      <button class="tab active" data-filter="all">전체</button>
      <button class="tab" data-filter="SHOPPING">쇼핑검색</button>
      <button class="tab" data-filter="BRAND_SEARCH">브랜드검색</button>
      <button class="tab" data-filter="WEB_SITE">파워링크</button>
    </div>
  </section>

  <!-- Campaign List -->
  <section class="list-section">
    <div class="list-header">
      <span class="list-header-title">캠페인별 성과</span>
      <span class="list-header-action" id="sortToggle">비용순</span>
    </div>
    <div class="list-body" id="campaignList">
      <!-- 동적 렌더링 -->
    </div>
  </section>

  <!-- 계정 정보 -->
  <section class="info-section">
    <div class="info-card">
      <span class="caption">계정</span>
      <span class="body">차일디 SA (1667291)</span>
    </div>
    <div class="info-card">
      <span class="caption">매체</span>
      <span class="body">네이버 검색광고</span>
    </div>
    <div class="info-card">
      <span class="caption">데이터 기준</span>
      <span class="body" id="dataDate">-</span>
    </div>
  </section>

  <script src="app.js"></script>
</body>
</html>
